<div class="mb-8"><h2 class="font-display text-3xl tracking-tight mb-1 text-slate-800">New Prescription</h2><p class="text-slate-500 text-sm">Assign medication to a patient</p></div>

@if (errorMessage()) {
  <div class="rounded-xl px-4 py-3 text-sm mb-5 bg-red-50 border border-red-200 text-red-700">{{ errorMessage() }}</div>
}
@if (successMessage()) {
  <div class="rounded-xl px-4 py-3 text-sm mb-5 bg-green-50 border border-green-200 text-green-700">{{ successMessage() }}</div>
}

<div class="bg-white border border-black/10 rounded-2xl p-6 max-w-2xl shadow-sm">
  <div class="mb-5">
    <label class="block text-xs font-medium uppercase tracking-widest text-slate-500 mb-2">Patient</label>
    <select [(ngModel)]="selectedPatientId" class="w-full px-4 py-3.5 bg-primary-lighter border border-black/10 rounded-xl text-slate-800 text-sm">
      <option value="">— Select a patient —</option>
      @for (p of patients(); track p._id) {
        <option [value]="p._id">{{ p.userId?.name }} ({{ p.userId?.phone_number }})</option>
      }
    </select>
  </div>
  <div class="mb-5">
    <label class="block text-xs font-medium uppercase tracking-widest text-slate-500 mb-2">Medication</label>
    <select [(ngModel)]="selectedMedId" class="w-full px-4 py-3.5 bg-primary-lighter border border-black/10 rounded-xl text-slate-800 text-sm">
      <option value="">— Select a medication —</option>
      @for (m of medications(); track m._id) {
        <option [value]="m._id">{{ m.medication_name }} · {{ m.dosage }}</option>
      }
    </select>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
    <div>
      <label class="block text-xs font-medium uppercase tracking-widest text-slate-500 mb-2">Start Date</label>
      <input type="date" [(ngModel)]="startDate" class="w-full px-4 py-3.5 bg-primary-lighter border border-black/10 rounded-xl text-slate-800 text-sm" />
    </div>
    <div>
      <label class="block text-xs font-medium uppercase tracking-widest text-slate-500 mb-2">End Date</label>
      <input type="date" [(ngModel)]="endDate" class="w-full px-4 py-3.5 bg-primary-lighter border border-black/10 rounded-xl text-slate-800 text-sm" />
    </div>
  </div>
  <div class="mb-5">
    <label class="block text-xs font-medium uppercase tracking-widest text-slate-500 mb-2">Reminder Times</label>
    <div class="flex flex-wrap gap-2 mt-2 mb-2">
      @for (t of times(); track t) {
        <div class="flex items-center gap-1.5 px-3 py-1.5 bg-primary-light border border-primary/20 rounded-full text-xs text-primary-dark font-medium">
          {{ formatTime(t) }}
          <button (click)="removeTime(t)" class="bg-transparent border-none text-primary-dark cursor-pointer text-base leading-none ml-0.5 hover:text-red-600">×</button>
        </div>
      }
    </div>
    <div class="flex gap-2">
      <input type="time" [(ngModel)]="newTime" class="flex-1 px-4 py-2.5 bg-primary-lighter border border-black/10 rounded-xl text-slate-800 text-sm" />
      <button (click)="addTime()" class="flex-shrink-0 px-4 py-2.5 border border-black/10 rounded-xl text-sm hover:border-primary hover:text-primary transition-colors cursor-pointer bg-white text-slate-600">+ Add</button>
    </div>
  </div>
  <div class="mb-6">
    <label class="block text-xs font-medium uppercase tracking-widest text-slate-500 mb-2">Notes</label>
    <textarea [(ngModel)]="notes" placeholder="Special instructions…" class="w-full px-4 py-3.5 bg-primary-lighter border border-black/10 rounded-xl text-slate-800 text-sm"></textarea>
  </div>
  <button (click)="submit()" class="w-full py-3.5 bg-primary text-white font-semibold rounded-xl text-sm hover:bg-primary-dark transition-colors cursor-pointer border-none">Create Prescription</button>
</div>
